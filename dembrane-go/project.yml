name: DembraneGo
options:
  bundleIdPrefix: com.dembrane
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  DembraneCore:
    path: Packages/DembraneCore

settings:
  base:
    # XcodeGen's SettingPresets aren't on this machine, so set the defaults we
    # rely on explicitly. $(TARGET_NAME) keeps bundle names space-free.
    PRODUCT_NAME: "$(TARGET_NAME)"
    # Explicit module builds reject the local DembraneCore module on the
    # versioned ios26.0-simulator triple; implicit modules resolve it cleanly.
    SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "JMCP69LCSU"
    SWIFT_VERSION: "5.0"
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: "YES"
      ENABLE_TESTABILITY: "YES"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
    Release:
      ONLY_ACTIVE_ARCH: "NO"

targets:
  DembraneGo:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: DembraneCore
      - target: DembraneGoWidgets
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: "dembrane go"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIBackgroundModes: [audio]            # keep recording alive when backgrounded / locked
        NSSupportsLiveActivities: true        # Dynamic Island / Live Activity
        NSMicrophoneUsageDescription: "dembrane go records audio so you can transcribe and revisit your conversations."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.dembrane.go"
        # Use our generated App/Info.plist (info: above), not an auto-generated one.
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_STYLE: "Automatic"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"

  DembraneGoWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Widgets
    dependencies:
      - package: DembraneCore
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: "dembrane go"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "com.dembrane.go.Widgets"

  DembraneGoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Tests
    dependencies:
      - target: DembraneGo
      - package: DembraneCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: "com.dembrane.go.tests"
        # Resolve @testable host symbols against the app (preset normally sets this).
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  DembraneGo:
    build:
      targets:
        DembraneGo: all
        DembraneGoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DembraneGoTests
