name: DembraneGo
options:
  bundleIdPrefix: com.dembrane
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  DembraneCore:
    path: Packages/DembraneCore

settings:
  base:
    # XcodeGen's SettingPresets aren't on this machine, so set the defaults we
    # rely on explicitly. $(TARGET_NAME) keeps bundle names space-free.
    PRODUCT_NAME: "$(TARGET_NAME)"
    # Explicit module builds reject the local DembraneCore module on the
    # versioned ios26.0-simulator triple; implicit modules resolve it cleanly.
    SWIFT_ENABLE_EXPLICIT_MODULES: "NO"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "JMCP69LCSU"
    SWIFT_VERSION: "5.0"
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: "YES"
      ENABLE_TESTABILITY: "YES"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
    Release:
      ONLY_ACTIVE_ARCH: "NO"

targets:
  DembraneGo:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: DembraneCore
    settings:
      base:
        # User-facing name comes from CFBundleDisplayName below; the .app bundle
        # stays "DembraneGo" so TEST_HOST (and paths) avoid the space.
        PRODUCT_BUNDLE_IDENTIFIER: "com.dembrane.go"
        CODE_SIGN_STYLE: "Automatic"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "dembrane go"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  DembraneGoTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: App/Tests
    dependencies:
      - target: DembraneGo
      - package: DembraneCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: "com.dembrane.go.tests"
        # Resolve @testable host symbols against the app (preset normally sets this).
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  DembraneGo:
    build:
      targets:
        DembraneGo: all
        DembraneGoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DembraneGoTests
