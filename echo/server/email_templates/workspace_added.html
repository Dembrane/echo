<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <div style="display:none;font-size:1px;color:#f5f5f5;line-height:1px;max-height:0px;max-width:0px;opacity:0;overflow:hidden;">
    {{ inviter_name }} added you to {{ workspace_name }} on dembrane.
  </div>
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #f5f5f5; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 480px; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
          <!-- Header -->
          <tr>
            <td style="padding: 32px 32px 24px; text-align: center;">
              <!-- Logo URL must match deployment domain -->
              <img src="https://dashboard.dembrane.com/dembrane-logo.png" alt="dembrane" height="28" style="height: 28px;">
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 0 32px 32px;">
              <h2 style="margin: 0 0 8px; font-size: 20px; font-weight: 400; color: #1a1a1a;">
                You've been added to a workspace
              </h2>
              <p style="margin: 0 0 24px; font-size: 15px; line-height: 1.5; color: #4a4a4a;">
                {{ inviter_name }} added you to
                <em>{{ workspace_name }}</em> on dembrane.
                You can start collaborating right away.
              </p>

              <!-- CTA Button -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <a href="{{ invite_url }}"
                       style="display: inline-block; padding: 12px 32px; background-color: #4169e1; color: #ffffff; text-decoration: none; border-radius: 6px; font-size: 15px; font-weight: 400;">
                      Open workspace
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 16px 32px; border-top: 1px solid #eee; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #aaa;">
                dembrane - conversations that matter
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
